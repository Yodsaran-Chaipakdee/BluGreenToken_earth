<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blu Green Token Explorer</title>
    <link rel="icon" type="image/png" href="./src/Logo.png" />
    <link rel="apple-touch-icon" href="./src/Logo.png" />
    <link
      rel="stylesheet"
      href="./vendor/cesium/Widgets/widgets.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.CESIUM_BASE_URL = "./vendor/cesium/";
    </script>
    <script src="./vendor/cesium/Cesium.js"></script>
  </head>
  <body>
    <div id="cesiumContainer" aria-label="Interactive 3D Earth"></div>

    <div id="loader" class="loader" role="status">
      <strong>Loading Earth</strong>
      <span>Satellite imagery, atmosphere, stars, and cinematic camera.</span>
    </div>

    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="./src/Logo.png" alt="Blu Green Token Explorer logo" />
        <span>Blu Green Token Explorer</span>
      </div>
      <div class="coord-readout" id="coordReadout">Lat 13.7563, Lon 100.5018</div>
    </header>

    <aside class="panel">
      <div class="panel-row">
        <button id="flyThailand" type="button">Thailand</button>
        <button id="flyOrbit" type="button">Orbit</button>
        <button id="toggleSpin" type="button">Pause</button>
        <button id="uploadKmz" type="button">Upload KMZ</button>
      </div>
      <div class="data-tabs" aria-label="KMZ data files">
        <span class="data-tabs-label">Data</span>
        <div id="kmzSelector" class="kmz-selector">
          <button id="kmzDropdownButton" class="kmz-select-button" type="button" aria-expanded="false" aria-controls="kmzDropdown">
            <span id="kmzSelectedLabel">Select data</span>
            <span class="kmz-select-arrow" aria-hidden="true"></span>
          </button>
          <div id="kmzDropdown" class="kmz-dropdown" hidden>
            <input id="kmzSearch" class="kmz-search" type="search" placeholder="Search KMZ" autocomplete="off" />
            <div id="kmzTabs" class="data-tabs-list" role="listbox"></div>
          </div>
        </div>
      </div>
      <input id="kmzFile" class="file-input" type="file" accept=".kmz,.kml,application/vnd.google-earth.kmz,application/vnd.google-earth.kml+xml" />
      <span id="kmzStatus" class="upload-status" aria-live="polite"></span>
    </aside>

    <aside id="fieldInfoCard" class="field-info-card" aria-live="polite">
      <h2 id="fieldInfoTitle">-</h2>
      <div class="metric-list">
        <div class="metric-card">
          <span>&#x0E2D;&#x0E31;&#x0E15;&#x0E23;&#x0E32;&#x0E23;&#x0E2D;&#x0E14;&#x0E15;&#x0E32;&#x0E22;&#x0E25;&#x0E48;&#x0E32;&#x0E2A;&#x0E38;&#x0E14;</span>
          <strong>-</strong>
        </div>
        <div class="metric-card">
          <span>&#x0E1E;&#x0E37;&#x0E49;&#x0E19;&#x0E17;&#x0E35;&#x0E48; workbook</span>
          <strong>-</strong>
        </div>
        <div class="metric-card">
          <span>&#x0E1E;&#x0E37;&#x0E49;&#x0E19;&#x0E17;&#x0E35;&#x0E48;&#x0E1B;&#x0E25;&#x0E39;&#x0E01;&#x0E08;&#x0E23;&#x0E34;&#x0E07;</span>
          <strong>-</strong>
        </div>
      </div>
      <dl class="info-list">
        <div><dt>&#x0E42;&#x0E04;&#x0E23;&#x0E07;&#x0E01;&#x0E32;&#x0E23;</dt><dd>-</dd></div>
        <div><dt>&#x0E08;&#x0E31;&#x0E07;&#x0E2B;&#x0E27;&#x0E31;&#x0E14;</dt><dd>-</dd></div>
        <div><dt>&#x0E15;&#x0E33;&#x0E1A;&#x0E25; / &#x0E2D;&#x0E33;&#x0E40;&#x0E20;&#x0E2D;</dt><dd>-</dd></div>
        <div><dt>&#x0E2A;&#x0E16;&#x0E32;&#x0E19;&#x0E30;&#x0E01;&#x0E48;&#x0E2D;&#x0E19;&#x0E2D;&#x0E31;&#x0E1B;&#x0E40;&#x0E14;&#x0E15;</dt><dd>-</dd></div>
        <div><dt>&#x0E01;&#x0E32;&#x0E23;&#x0E40;&#x0E1B;&#x0E25;&#x0E35;&#x0E48;&#x0E22;&#x0E19;&#x0E2A;&#x0E16;&#x0E32;&#x0E19;&#x0E30;</dt><dd>-</dd></div>
        <div><dt>&#x0E1E;&#x0E37;&#x0E49;&#x0E19;&#x0E17;&#x0E35;&#x0E48; polygon</dt><dd>-</dd></div>
      </dl>
    </aside>
    <div class="zoom">
      <button id="zoomIn" type="button" aria-label="Zoom in">+</button>
      <button id="zoomOut" type="button" aria-label="Zoom out">-</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
